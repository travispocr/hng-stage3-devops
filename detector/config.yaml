slack:
  webhook_url: "${SLACK_WEBHOOK_URL}"

detection:
  window_seconds: 60
  baseline_window_minutes: 30
  baseline_recalc_seconds: 60
  zscore_threshold: 3.0
  rate_multiplier: 5.0
  error_rate_multiplier: 3.0
  min_requests_for_baseline: 10

blocking:
  unban_schedule:
    - 10
    - 30
    - 120
    - -1

dashboard:
  port: 8080
  refresh_seconds: 3

logging:
  audit_log: "/var/log/detector/audit.log"
  nginx_log: "/var/log/nginx/hng-access.log"
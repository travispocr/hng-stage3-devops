services:
  nginx:
    image: nginx:alpine
    container_name: hng-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - HNG-nginx-logs:/var/log/nginx
    depends_on:
      - nextcloud
    restart: unless-stopped
    networks:
      - hng-network

  nextcloud:
    image: kefaslungu/hng-nextcloud
    container_name: hng-nextcloud
    environment:
      - MYSQL_HOST=db
      - MYSQL_DATABASE=nextcloud
      - MYSQL_USER=nextcloud
      - MYSQL_PASSWORD=nextcloud_password
      - NEXTCLOUD_ADMIN_USER=admin
      - NEXTCLOUD_ADMIN_PASSWORD=admin_password
      - NEXTCLOUD_TRUSTED_DOMAINS=psitdev.duckdns.org 107.21.30.194
    volumes:
      - nextcloud_data:/var/www/html
      - HNG-nginx-logs:/var/log/nginx:ro
    depends_on:
      - db
    restart: unless-stopped
    networks:
      - hng-network

  db:
    image: mariadb:10.11
    container_name: hng-db
    environment:
      - MYSQL_ROOT_PASSWORD=root_password
      - MYSQL_DATABASE=nextcloud
      - MYSQL_USER=nextcloud
      - MYSQL_PASSWORD=nextcloud_password
    volumes:
      - db_data:/var/lib/mysql
    restart: unless-stopped
    networks:
      - hng-network

  detector:
    image: python:3.11-slim
    container_name: hng-detector
    working_dir: /app
    command: >
      bash -c "
        pip install -r requirements.txt -q &&
        python main.py
      "
    volumes:
      - ./detector:/app
      - HNG-nginx-logs:/var/log/nginx:ro
    detector:
    depends_on:
      - nginx
    restart: unless-stopped
    networks:
      - hng-network
    cap_add:
      - NET_ADMIN
    environment:
      - PYTHONUNBUFFERED=1
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL}

volumes:
  HNG-nginx-logs:
    name: HNG-nginx-logs
  nextcloud_data:
  db_data:

networks:
  hng-network:
    driver: bridge